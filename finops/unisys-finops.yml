meters:
  - name: contract
    description: Unisys managed-services or consulting engagement billed under negotiated terms.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: API consumption is not separately metered. Track usage internally against contracted
      service levels rather than per-call cost.
  - name: Allocation
    description: Allocate Unisys spend at the engagement level (per managed service or solution),
      typically already tied to a business owner.
  - name: Optimization
    description: Optimization happens at contract renewal, scope adjustment, and consolidation across
      Unisys services rather than per-API-call.
  - name: Accountability
    description: Assign ownership to the executive sponsor of each Unisys engagement; FinOps signals
      come from invoice review and SLA dashboards.
