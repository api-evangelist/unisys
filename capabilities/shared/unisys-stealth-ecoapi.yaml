naftiko: "1.0.0-alpha1"

info:
  label: "Unisys Stealth EcoAPI"
  description: "Zero trust network segmentation API for dynamic endpoint and user isolation, un-isolation, and role management."
  tags:
    - Unisys
    - Stealth
    - Zero Trust
    - Security
    - Endpoint Isolation
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      STEALTH_HOST: STEALTH_HOST
      STEALTH_PORT: STEALTH_PORT
      STEALTH_USERNAME: STEALTH_USERNAME
      STEALTH_PASSWORD: STEALTH_PASSWORD

capability:
  consumes:
    - type: http
      namespace: stealth
      baseUri: "https://{{STEALTH_HOST}}:{{STEALTH_PORT}}"
      description: "Unisys Stealth EcoAPI server."
      authentication:
        type: basic
        username: "{{STEALTH_USERNAME}}"
        password: "{{STEALTH_PASSWORD}}"
      resources:
        - name: roles
          path: /api/roles
          description: "Stealth role management"
          operations:
            - name: get-stealth-roles
              method: GET
              description: "Retrieve Stealth network roles"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: endpoint-isolation
          path: /api/endpoint/isolate
          description: "Endpoint isolation operations"
          operations:
            - name: isolate-endpoint
              method: POST
              description: "Isolate an endpoint from the Stealth network"
              inputParameters:
                - name: endpoint
                  in: body
                  type: string
                  required: true
                  description: "FQDN of the endpoint to isolate"
                - name: roleId
                  in: body
                  type: string
                  required: false
                  description: "Optional isolation role ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: endpoint-unisolation
          path: /api/endpoint/unisolate
          description: "Endpoint un-isolation operations"
          operations:
            - name: unisolate-endpoint
              method: POST
              description: "Remove isolation from an endpoint in the Stealth network"
              inputParameters:
                - name: endpoint
                  in: body
                  type: string
                  required: true
                  description: "FQDN of the endpoint to un-isolate"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: user-isolation
          path: /api/user/isolate
          description: "User isolation operations"
          operations:
            - name: isolate-user
              method: POST
              description: "Isolate a user from the Stealth network"
              inputParameters:
                - name: user
                  in: body
                  type: string
                  required: true
                  description: "Username to isolate"
                - name: roleId
                  in: body
                  type: string
                  required: false
                  description: "Optional isolation role ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: user-unisolation
          path: /api/user/unisolate
          description: "User un-isolation operations"
          operations:
            - name: unisolate-user
              method: POST
              description: "Remove isolation from a user in the Stealth network"
              inputParameters:
                - name: user
                  in: body
                  type: string
                  required: true
                  description: "Username to un-isolate"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: combined-isolation
          path: /api/isolate
          description: "Combined endpoint and user isolation"
          operations:
            - name: isolate-machine-and-user
              method: POST
              description: "Isolate both an endpoint and user simultaneously"
              inputParameters:
                - name: endpoint
                  in: body
                  type: string
                  required: false
                  description: "FQDN of the endpoint to isolate"
                - name: user
                  in: body
                  type: string
                  required: false
                  description: "Username to isolate"
                - name: roleId
                  in: body
                  type: string
                  required: false
                  description: "Optional isolation role ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: combined-unisolation
          path: /api/unisolate
          description: "Combined endpoint and user un-isolation"
          operations:
            - name: unisolate-machine-and-user
              method: POST
              description: "Remove isolation from both an endpoint and user simultaneously"
              inputParameters:
                - name: endpoint
                  in: body
                  type: string
                  required: false
                  description: "FQDN of the endpoint to un-isolate"
                - name: user
                  in: body
                  type: string
                  required: false
                  description: "Username to un-isolate"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: unisys-stealth-api
      resources:
        - path: /v1/roles
          name: roles
          operations:
            - method: GET
              name: get-stealth-roles
              description: "Get Stealth network roles"
        - path: /v1/endpoints/isolate
          name: endpoint-isolate
          operations:
            - method: POST
              name: isolate-endpoint
              description: "Isolate an endpoint"
        - path: /v1/endpoints/unisolate
          name: endpoint-unisolate
          operations:
            - method: POST
              name: unisolate-endpoint
              description: "Un-isolate an endpoint"
        - path: /v1/users/isolate
          name: user-isolate
          operations:
            - method: POST
              name: isolate-user
              description: "Isolate a user"
        - path: /v1/users/unisolate
          name: user-unisolate
          operations:
            - method: POST
              name: unisolate-user
              description: "Un-isolate a user"

    - type: mcp
      port: 9100
      namespace: unisys-stealth-mcp
      transport: http
      tools:
        - name: get-stealth-roles
          description: "Retrieve Stealth network role configurations"
          hints:
            readOnly: true
            openWorld: false
          call: "stealth.get-stealth-roles"
          outputParameters:
            - type: object
              mapping: "$."
        - name: isolate-endpoint
          description: "Isolate an endpoint from the Stealth zero trust network"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "stealth.isolate-endpoint"
          with:
            endpoint: "tools.endpoint"
            roleId: "tools.roleId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unisolate-endpoint
          description: "Remove isolation from an endpoint in the Stealth network"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "stealth.unisolate-endpoint"
          with:
            endpoint: "tools.endpoint"
          outputParameters:
            - type: object
              mapping: "$."
        - name: isolate-user
          description: "Isolate a user from the Stealth zero trust network"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "stealth.isolate-user"
          with:
            user: "tools.user"
            roleId: "tools.roleId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unisolate-user
          description: "Remove isolation from a user in the Stealth network"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "stealth.unisolate-user"
          with:
            user: "tools.user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: isolate-machine-and-user
          description: "Simultaneously isolate both an endpoint and user from Stealth"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "stealth.isolate-machine-and-user"
          with:
            endpoint: "tools.endpoint"
            user: "tools.user"
            roleId: "tools.roleId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unisolate-machine-and-user
          description: "Simultaneously remove isolation from both an endpoint and user in Stealth"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "stealth.unisolate-machine-and-user"
          with:
            endpoint: "tools.endpoint"
            user: "tools.user"
          outputParameters:
            - type: object
              mapping: "$."
